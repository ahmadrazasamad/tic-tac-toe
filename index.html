<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="main">
        <div>
            <h1>Tic Tac Toe</h1>
            <div id="selector">
                <div>
                    <button class="btn" id="sp-btn">Single Player</button>
                    <button class="btn" id="mp-btn">Multiplayer</button>
                </div>
                
                <div id="sp-game-setting">
                    <div id="x">X<span class="win-count">-</span></div>
                    <div id="o">O<span class="win-count">-</span></div>
                    <h3>Start game or select player</h3>
                </div>

                <div id="mp-game-setting">
                    <div>
                        <label for="player1">Choose Player 1:</label>
                        <select name="xo-choice" id="player1">
                            <option hidden>Select One</option>
                            <option value="X">X</option>
                            <option value="O">O</option>
                        </select>
                    </div>
                    <div>
                        <label for="player2">Choose Player 2:</label>
                        <select name="xo-choice" id="player2">
                            <option hidden>Select One</option>
                            <option value="X">X</option>
                            <option value="O">O</option>
                        </select>
                    </div>
                </div>

            </div>
            <main id="game"> <!-- main tag is a semantic markup -->
                <div>
                    <div id="game-container">
                        <div class="box left-box" id="box-0"></div>
                        <div class="box mid-box" id="box-1"></div>
                        <div class="box right-box" id="box-2"></div>
                        <div class="box left-box" id="box-3"></div>
                        <div class="box mid-box" id="box-4"></div>
                        <div class="box right-box" id="box-5"></div>
                        <div class="box left-box" id="box-6"></div>
                        <div class="box mid-box" id="box-7"></div>
                        <div class="box right-box" id="box-8"></div>
                    </div>
                    <h2 id="status"></h2>
                    <button class="btn" id="reset-game-btn">Reset</button>
                    <button class="btn" id="new-game-btn">New Game</button>
                </div>
            </main>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
